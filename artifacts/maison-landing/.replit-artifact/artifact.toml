kind = "web"
previewPath = "/"
title = "Maison Lumière — Landing Page"
version = "1.0.0"
id = "artifacts/maison-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24004

[services.development]
run = "pnpm --filter @workspace/maison-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maison-landing", "run", "build" ]
publicDir = "artifacts/maison-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24004"
BASE_PATH = "/"
